<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; display: grid; place-items: center; min-height: 100vh;
         background: #F5F0E8; font-family: "Courier New", monospace; }
  svg { width: min(70vmin, 260px); }
  .rim { fill: none; stroke: #1A1A1A; stroke-width: 4; }
  .tick { stroke: #1A1A1A; stroke-width: 2; }
  .hand { stroke: #1A1A1A; stroke-linecap: round; }
  .second { stroke: #C41E1E; stroke-width: 1.5; }
  #label { color: #6B6B6B; font-size: 13px; letter-spacing: 0.15em;
           text-transform: uppercase; margin-top: 1em; }
</style>
</head>
<body>
<div>
  <svg viewBox="0 0 200 200">
    <circle class="rim" cx="100" cy="100" r="94"/>
    <g id="ticks"></g>
    <line id="h" class="hand" x1="100" y1="100" x2="100" y2="55" stroke-width="5"/>
    <line id="m" class="hand" x1="100" y1="100" x2="100" y2="35" stroke-width="3"/>
    <line id="s" class="hand second" x1="100" y1="110" x2="100" y2="28"/>
    <circle cx="100" cy="100" r="4" fill="#1A1A1A"/>
  </svg>
  <div id="label"></div>
</div>
<script>
  const ticks = document.getElementById('ticks');
  for (let i = 0; i < 12; i++) {
    const a = i * Math.PI / 6, r1 = 84, r2 = 92;
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('class', 'tick');
    l.setAttribute('x1', 100 + r1 * Math.sin(a)); l.setAttribute('y1', 100 - r1 * Math.cos(a));
    l.setAttribute('x2', 100 + r2 * Math.sin(a)); l.setAttribute('y2', 100 - r2 * Math.cos(a));
    ticks.appendChild(l);
  }
  function rot(id, deg) {
    document.getElementById(id).setAttribute('transform', `rotate(${deg} 100 100)`);
  }
  function tick() {
    const now = new Date();
    rot('s', now.getSeconds() * 6);
    rot('m', now.getMinutes() * 6 + now.getSeconds() / 10);
    rot('h', (now.getHours() % 12) * 30 + now.getMinutes() / 2);
    document.getElementById('label').textContent = now.toLocaleTimeString();
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
