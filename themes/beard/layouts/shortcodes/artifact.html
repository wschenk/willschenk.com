{{- $src := .Get "src" -}}
{{- $file := .Get "file" -}}
{{- $title := .Get "title" | default "Artifact" -}}
{{- $height := .Get "height" | default "480px" -}}
<figure class="chat-artifact">
  <figcaption class="chat-artifact-bar">
    <span class="chat-artifact-label">Artifact</span>
    <span class="chat-artifact-title">{{ $title }}</span>
    {{ with $src }}<a class="chat-artifact-open" href="{{ . }}" target="_blank" rel="noopener">open&nbsp;&#8599;</a>{{ end }}
  </figcaption>
  {{- if $file }}
  {{- $content := (print .Page.File.Dir $file) | readFile }}
  <iframe class="chat-artifact-frame" style="{{ printf "height:%s" $height | safeCSS }}" sandbox="allow-scripts" srcdoc="{{ $content }}" title="{{ $title }}" loading="lazy"></iframe>
  {{- else }}
  <iframe class="chat-artifact-frame" style="{{ printf "height:%s" $height | safeCSS }}" src="{{ $src }}" title="{{ $title }}" loading="lazy"></iframe>
  {{- end }}
</figure>
