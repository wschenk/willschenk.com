{{- $summary := .Get "summary" | default "Model response" -}}
{{- $words := .Inner | countwords -}}
<details class="chat-response"{{ if .Get "open" }} open{{ end }}>
  <summary>
    <span class="chat-response-summary">{{ $summary }}</span>
    <span class="chat-response-meta">{{ $words }} words</span>
  </summary>
  <div class="chat-response-body">{{ .Inner | markdownify }}</div>
</details>
